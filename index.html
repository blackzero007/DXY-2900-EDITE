<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>树洞 · 匿名留言板</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🌳</span>
                <h1>树洞</h1>
            </div>
            <p class="subtitle">说出你的心声，在这里，没人知道你是谁</p>
            <button class="settings-btn" id="settingsBtn" title="设置">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </header>

        <nav class="main-nav">
            <button class="nav-tab active" data-page="treehole">
                <span class="nav-icon">🌳</span>
                <span>树洞</span>
            </button>
            <button class="nav-tab" data-page="capsule">
                <span class="nav-icon">⏳</span>
                <span>时光胶囊</span>
            </button>
            <button class="nav-tab" data-page="favorites">
                <span class="nav-icon">⭐</span>
                <span>我的收藏</span>
            </button>
            <button class="nav-tab" data-page="drift">
                <span class="nav-icon">🍾</span>
                <span>漂流瓶</span>
            </button>
            <button class="nav-tab" data-page="ranking">
                <span class="nav-icon">🏆</span>
                <span>排行榜</span>
            </button>
        </nav>

        <div class="page-content" id="treeholePage">

        <section class="daily-topic-section">
            <div class="daily-topic-card" id="dailyTopicCard"></div>
        </section>

        <section class="post-section">
            <div class="post-card">
                <div class="post-header">
                    <span class="post-avatar" id="previewAvatar">🐱</span>
                    <div class="post-nickname-wrap">
                        <span class="post-nickname" id="previewNickname">橘子味的猫</span>
                        <button class="refresh-btn" id="refreshNickname" title="换一个昵称">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M23 4v6h-6M1 20v-6h6"/>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                            </svg>
                        </button>
                        <button class="lock-btn" id="lockIdentityBtn" title="锁定当前身份">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="post-tags" id="postTagSelector"></div>
                <div class="post-mood-section">
                    <div class="post-mood-label">今天的心情：</div>
                    <div class="post-moods" id="postMoodSelector"></div>
                </div>
                <div class="post-capsule-section">
                    <div class="post-capsule-label">
                        <span class="post-capsule-icon">⏳</span>
                        <span>时光胶囊</span>
                        <span class="post-capsule-hint">设定一个未来日期，到期才会公开</span>
                    </div>
                    <div class="post-capsule-options" id="postCapsuleOptions">
                        <button class="post-capsule-option active" data-capsule="none">
                            <span class="capsule-option-icon">📝</span>
                            <span class="capsule-option-text">普通发布</span>
                        </button>
                        <button class="post-capsule-option" data-capsule="3days">
                            <span class="capsule-option-icon">🌱</span>
                            <span class="capsule-option-text">3天后</span>
                        </button>
                        <button class="post-capsule-option" data-capsule="7days">
                            <span class="capsule-option-icon">🌿</span>
                            <span class="capsule-option-text">7天后</span>
                        </button>
                        <button class="post-capsule-option" data-capsule="30days">
                            <span class="capsule-option-icon">🌳</span>
                            <span class="capsule-option-text">30天后</span>
                        </button>
                        <button class="post-capsule-option" data-capsule="custom">
                            <span class="capsule-option-icon">📅</span>
                            <span class="capsule-option-text">自定义</span>
                        </button>
                    </div>
                    <div class="post-capsule-date" id="postCapsuleDate" style="display: none;">
                        <input type="date" id="capsuleDateInput" min="">
                        <span class="capsule-date-hint">选择一个未来的日期</span>
                    </div>
                </div>
                <textarea 
                    class="post-input" 
                    id="postInput" 
                    placeholder="有什么想说的？在这里倾诉吧..."
                    maxlength="500"
                ></textarea>
                <div class="post-footer">
                    <span class="char-count"><span id="charCount">0</span>/500</span>
                    <button class="submit-btn" id="submitBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                        发布
                    </button>
                </div>
            </div>
        </section>

        <section class="tag-filter-section">
            <div class="tag-filters" id="tagFilters"></div>
        </section>

        <section class="filter-section">
            <div class="sort-tabs">
                <button class="sort-tab active" data-sort="hot">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2s4 4 4 8a4 4 0 0 1-8 0c0-2 1-3 1-3s-1 5 3 5 3-4 3-7c0-2-1-3-1-3z"/>
                    </svg>
                    最热
                </button>
                <button class="sort-tab" data-sort="new">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    最新
                </button>
            </div>
            <div class="resonate-filter-toggle">
                <label class="toggle-switch">
                    <input type="checkbox" id="resonateFilterToggle">
                    <span class="toggle-slider"></span>
                </label>
                <span class="toggle-label">只看共鸣</span>
            </div>
            <div class="mood-filter-wrap">
                <select class="mood-filter" id="moodFilter">
                    <option value="all">全部心情</option>
                </select>
            </div>
            <div class="message-count">共 <span id="messageCount">0</span> 条心声</div>
        </section>

        <section class="search-section">
            <div class="search-box">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索留言内容或匿名昵称...">
                <button class="search-clear-btn" id="searchClearBtn" style="display: none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </section>

        <section class="messages-section" id="messagesList">
        </section>

        </div>

        <div class="page-content hidden" id="capsulePage">
            <section class="capsule-header-section">
                <div class="capsule-header-card">
                    <div class="capsule-header-icon">⏳</div>
                    <div class="capsule-header-content">
                        <div class="capsule-header-title">时光胶囊</div>
                        <div class="capsule-header-desc">给未来的自己写一封信，在指定的那天，它会准时出现在树洞</div>
                    </div>
                    <div class="capsule-count">
                        <span class="capsule-count-num" id="capsuleCount">0</span>
                        <span class="capsule-count-unit">个</span>
                    </div>
                </div>
            </section>

            <section class="capsule-tabs-section">
                <div class="capsule-tabs">
                    <button class="capsule-tab active" data-capsule-tab="pending">
                        <span>待解锁</span>
                        <span class="capsule-tab-count" id="pendingCapsuleCount">0</span>
                    </button>
                    <button class="capsule-tab" data-capsule-tab="unlocked">
                        <span>已解锁</span>
                        <span class="capsule-tab-count" id="unlockedCapsuleCount">0</span>
                    </button>
                </div>
            </section>

            <section class="capsule-list" id="capsuleList">
            </section>
        </div>

        <div class="page-content hidden" id="favoritesPage">
            <section class="favorites-header-section">
                <div class="favorites-header-card">
                    <div class="favorites-header-icon">⭐</div>
                    <div class="favorites-header-content">
                        <div class="favorites-header-title">我的收藏</div>
                        <div class="favorites-header-desc">收藏那些打动你的树洞留言，随时回来慢慢品味</div>
                    </div>
                    <div class="favorites-count">
                        <span class="favorites-count-num" id="favoritesCount">0</span>
                        <span class="favorites-count-unit">条</span>
                    </div>
                </div>
            </section>

            <section class="favorites-sort-section">
                <div class="sort-tabs">
                    <button class="sort-tab active" data-fav-sort="new">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                        最新收藏
                    </button>
                    <button class="sort-tab" data-fav-sort="old">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 8 10"/>
                    </svg>
                        最早收藏
                    </button>
                </div>
            </section>

            <section class="favorites-list" id="favoritesList">
            </section>
        </div>

        <div class="page-content hidden" id="driftPage">
            <section class="drift-hero-section">
                <div class="drift-hero-card">
                    <div class="drift-hero-icon">🍾</div>
                    <div class="drift-hero-content">
                        <div class="drift-hero-title">漂流瓶</div>
                        <div class="drift-hero-desc">写下你的心愿，扔进大海，让它漂向未知的远方</div>
                    </div>
                </div>
            </section>

            <section class="drift-actions">
                <button class="drift-action-btn throw-btn" id="throwBottleBtn">
                    <span class="drift-btn-icon">✍️</span>
                    <span class="drift-btn-text">扔一个</span>
                    <span class="drift-btn-sub">写下你的留言</span>
                </button>
                <button class="drift-action-btn pick-btn" id="pickBottleBtn">
                    <span class="drift-btn-icon">🌊</span>
                    <span class="drift-btn-text">捞一个</span>
                    <span class="drift-btn-sub">随机遇见ta</span>
                </button>
            </section>

            <section class="drift-stats">
                <div class="drift-stat-item">
                    <span class="drift-stat-icon">📤</span>
                    <span class="drift-stat-label">扔出</span>
                    <span class="drift-stat-value" id="thrownCount">0</span>
                    <span class="drift-stat-unit">个</span>
                </div>
                <div class="drift-stat-item">
                    <span class="drift-stat-icon">📥</span>
                    <span class="drift-stat-label">捞到</span>
                    <span class="drift-stat-value" id="pickedCount">0</span>
                    <span class="drift-stat-unit">个</span>
                </div>
                <div class="drift-stat-item">
                    <span class="drift-stat-icon">💬</span>
                    <span class="drift-stat-label">回应</span>
                    <span class="drift-stat-value" id="replyCount">0</span>
                    <span class="drift-stat-unit">个</span>
                </div>
            </section>

            <section class="drift-current-section" id="driftCurrentSection" style="display: none;">
            </section>

            <section class="drift-my-section">
                <div class="section-header">
                    <span class="section-title">我扔出的漂流瓶</span>
                    <span class="section-count" id="myBottleCount">0</span>
                </div>
                <div class="drift-bottles-list" id="myBottlesList">
                </div>
            </section>

            <section class="drift-picked-section">
                <div class="section-header">
                    <span class="section-title">我捞到的漂流瓶</span>
                    <span class="section-count" id="pickedBottleCount">0</span>
                </div>
                <div class="drift-bottles-list" id="pickedBottlesList">
                </div>
            </section>
        </div>

        <div class="page-content hidden" id="rankingPage">
            <section class="ranking-header-section">
                <div class="ranking-header-card">
                    <div class="ranking-header-icon">🏆</div>
                    <div class="ranking-header-content">
                        <div class="ranking-header-title">共鸣排行榜</div>
                        <div class="ranking-header-desc">看看哪些心声最能引起大家的共鸣</div>
                    </div>
                </div>
            </section>

            <section class="ranking-tabs-section">
                <div class="ranking-tabs">
                    <button class="ranking-tab active" data-ranking-period="week">
                        <span>本周</span>
                    </button>
                    <button class="ranking-tab" data-ranking-period="month">
                        <span>本月</span>
                    </button>
                    <button class="ranking-tab" data-ranking-period="all">
                        <span>历史总榜</span>
                    </button>
                </div>
            </section>

            <section class="ranking-list" id="rankingList">
            </section>
        </div>

        <footer class="footer">
            <p>💫 你的秘密，树洞守护</p>
        </footer>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-overlay" id="settingsOverlay"></div>
        <div class="settings-content">
            <div class="settings-header">
                <h2>设置</h2>
                <button class="settings-close-btn" id="settingsCloseBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="settings-section">
                <div class="settings-section-title">视觉主题</div>
                <div class="theme-selector" id="themeSelector"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
